<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修仙版2048 - 五阶五行</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <!-- Header Section -->
                <div class="game-header text-center mb-4">
                    <h1 class="display-4 fw-bold text-primary">🎮 修仙版 2048</h1>
                    <p class="lead text-muted">五阶五行 · 二十五境 · 渡劫飞升</p>
                </div>

                <div class="row g-4">
                    <!-- Game Board Section -->
                    <div class="col-md-7">
                        <div class="game-container card shadow-lg">
                            <div class="card-header bg-gradient">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div class="score-panel">
                                        <span class="label">当前分数</span>
                                        <span id="current-score" class="score-value">0</span>
                                    </div>
                                    <div class="best-score-panel">
                                        <span class="label">最高分数</span>
                                        <span id="best-score" class="score-value">0</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="card-body p-3">
                                <!-- Game Grid -->
                                <div id="game-board" class="game-board"></div>
                                
                                <!-- Game Over Overlay -->
                                <div id="game-over" class="game-overlay d-none">
                                    <div class="overlay-content">
                                        <h2 class="text-danger fw-bold">游戏结束</h2>
                                        <p class="mb-3">最终得分：<span id="final-score">0</span></p>
                                        <button id="restart-btn" class="btn btn-primary btn-lg">重新开始</button>
                                    </div>
                                </div>
                            </div>

                            <div class="card-footer bg-light">
                                <div class="d-flex justify-content-center gap-3 flex-wrap">
                                    <button id="new-game-btn" class="btn btn-success">
                                        <i class="bi bi-play-circle"></i> 新游戏
                                    </button>
                                    <button id="auto-play-btn" class="btn btn-warning">
                                        <i class="bi bi-robot"></i> 自动运行
                                    </button>
                                    <button id="pause-btn" class="btn btn-secondary">
                                        <i class="bi bi-pause-circle"></i> 暂停
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Instructions -->
                        <div class="card mt-4 shadow-sm">
                            <div class="card-header bg-info text-white">
                                <h5 class="mb-0">📖 游戏说明</h5>
                            </div>
                            <div class="card-body">
                                <ul class="list-unstyled mb-0">
                                    <li>⌨️ 使用 <strong>方向键</strong> 或 <strong>WASD</strong> 移动方块</li>
                                    <li>🔄 相同等级的方块合并可晋升境界</li>
                                    <li>🎯 目标：合成最高境界「真仙之境」</li>
                                    <li>🤖 点击「自动运行」让AI帮你玩</li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <!-- Sidebar Section -->
                    <div class="col-md-5">
                        <!-- Pet Section -->
                        <div class="card mb-4 shadow-sm pet-card">
                            <div class="card-header bg-pink text-white">
                                <h5 class="mb-0">🐾 灵宠伙伴</h5>
                            </div>
                            <div class="card-body text-center">
                                <div id="pet-container" class="pet-animation">
                                    <div class="pet-sprite">🦊</div>
                                    <div class="pet-bubble d-none">
                                        <span id="pet-message">加油！</span>
                                    </div>
                                </div>
                                <p class="text-muted small mt-2">你的修行小伙伴</p>
                            </div>
                        </div>

                        <!-- Leaderboard Section -->
                        <div class="card shadow-sm">
                            <div class="card-header bg-warning">
                                <h5 class="mb-0">🏆 排行榜</h5>
                            </div>
                            <div class="card-body p-0">
                                <div id="leaderboard" class="leaderboard-list">
                                    <div class="text-center py-4 text-muted">
                                        暂无记录
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer bg-light">
                                <button id="clear-leaderboard" class="btn btn-sm btn-outline-danger w-100">
                                    清空排行榜
                                </button>
                            </div>
                        </div>

                        <!-- Tile Legend -->
                        <div class="card mt-4 shadow-sm">
                            <div class="card-header bg-purple text-white">
                                <h5 class="mb-0">📊 境界对照表</h5>
                            </div>
                            <div class="card-body p-2">
                                <div id="tile-legend" class="row g-1">
                                    <!-- Will be populated by JS -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/game.js"></script>
</body>
</html>
